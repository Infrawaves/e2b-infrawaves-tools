groups:
  - name: e2b-firecracker
    interval: 30s
    rules:
      - alert: Firecracker Exporter 离线
        uid: e2b-fc-exporter-down
        expr: up{job="nomad-nodeJob-exporter"} == 0
        for: 5m
        labels:
          severity: warning
          project: e2b
        annotations:
          summary: "节点 {{ $labels.instance }} 上的 nomad-nodeJob-exporter 离线"
          description: "Exporter 不可达,Firecracker 与 Allocation 视角的指标已丢失。"

      - alert: Firecracker SandboxID 解析错误增多
        uid: e2b-fc-sandbox-id-parse-errors
        expr: increase(e2b_fc_process_parse_errors_total[10m]) > 0
        for: 10m
        labels:
          severity: warning
          project: e2b
        annotations:
          summary: "节点 {{ $labels.node_ip }} 上 Sandbox-ID 解析失败"
          description: "最近 10 分钟,Exporter 从 {{ $value }} 个 Firecracker 命令行中无法提取 sandbox_id。"

      - alert: Nomad Allocation 异常
        uid: e2b-nomad-alloc-down
        expr: nomad_allocation_up == 0
        for: 5m
        labels:
          severity: critical
          project: e2b
        annotations:
          summary: "节点 {{ $labels.node_name }} 上的 Nomad allocation {{ $labels.service }} 处于 DOWN 状态"
          description: "当前状态={{ $labels.status }},期望状态={{ $labels.desired_status }}"

      - alert: Allocation CPU 饱和
        uid: e2b-alloc-cpu-saturated
        expr: nomad_allocation_cpu_usage_percentage > 90
        for: 10m
        labels:
          severity: warning
          project: e2b
        annotations:
          summary: "节点 {{ $labels.node_name }} 上 Allocation {{ $labels.job_name }} CPU 占用 {{ printf \"%.0f\" $value }}%"

      - alert: Allocation 内存饱和
        uid: e2b-alloc-mem-saturated
        expr: nomad_allocation_memory_usage_percentage > 90
        for: 10m
        labels:
          severity: warning
          project: e2b
        annotations:
          summary: "节点 {{ $labels.node_name }} 上 Allocation {{ $labels.job_name }} 内存占用 {{ printf \"%.0f\" $value }}%"

      - alert: Firecracker 进程泄露
        uid: e2b-fc-leak
        expr: e2b_sandbox_leak_count > 0 and on(node_ip) e2b_orchestrator_reachable == 1
        for: 20m
        labels:
          severity: warning
          project: e2b
        annotations:
          summary: "节点 {{ $labels.node_ip }} 上检测到 {{ $value }} 个泄露的 Firecracker 进程"
          description: "存在 sandbox_id 不在 orchestrator 运行列表的 Firecracker 进程。"

      - alert: 孤儿沙箱
        uid: e2b-sandbox-orphan
        expr: e2b_sandbox_orphan_count > 0 and on(node_ip) e2b_orchestrator_reachable == 1
        for: 20m
        labels:
          severity: warning
          project: e2b
        annotations:
          summary: "节点 {{ $labels.node_ip }} 上发现 {{ $value }} 个孤儿沙箱"
          description: "Orchestrator 认为沙箱仍在运行,但找不到对应的 Firecracker 进程 —— 状态分裂,通常是 fc 崩溃后 orchestrator 未清理。"

      - alert: 本机 Orchestrator 不可达
        uid: e2b-orchestrator-unreachable
        expr: e2b_orchestrator_reachable == 0
        for: 5m
        labels:
          severity: critical
          project: e2b
        annotations:
          summary: "节点 {{ $labels.node_ip }} 上本机 orchestrator gRPC 不可达"
          description: "已跳过沙箱泄露检测 —— Exporter 无法连接 127.0.0.1:9090 上的 orchestrator。"

      - alert: Allocation 抖动
        uid: e2b-alloc-flapping
        expr: changes(nomad_allocation_up[15m]) > 4
        for: 5m
        labels:
          severity: warning
          project: e2b
        annotations:
          summary: "节点 {{ $labels.node_name }} 上 Allocation {{ $labels.service }} 抖动(15 分钟内重启 {{ $value }} 次)"
          description: "Allocation 的 up/down 状态在 15 分钟内变化 > 4 次,处于不稳定状态。"

      - alert: 集群 Firecracker 进程数为零
        uid: e2b-cluster-fc-zero
        expr: sum(e2b_fc_process_count) == 0
        for: 30m
        labels:
          severity: critical
          project: e2b
        annotations:
          summary: "整集群已 30 分钟未观测到任何 Firecracker 进程"
          description: "全集群 Firecracker 进程数为 0 —— 可能是沙箱被主动排空、调度器异常,或全部 Exporter 上报为 0(数据链路问题)。"

      - alert: Firecracker 进程线程数过多
        uid: e2b-fc-excess-threads
        expr: e2b_fc_process_threads > 30
        for: 15m
        labels:
          severity: warning
          project: e2b
        annotations:
          summary: "节点 {{ $labels.node_ip }} 上 Firecracker {{ $labels.sandbox_id }} 线程数为 {{ $value }}"
          description: "单个 fc 进程的线程数 > 30(正常 p99=5),很可能是线程泄露或 VM 卡住。pid={{ $labels.pid }}。"

      - alert: Firecracker 进程打开 FD 过多
        uid: e2b-fc-excess-open-fds
        expr: e2b_fc_process_open_fds > 1300
        for: 15m
        labels:
          severity: warning
          project: e2b
        annotations:
          summary: "节点 {{ $labels.node_ip }} 上 Firecracker {{ $labels.sandbox_id }} 打开了 {{ $value }} 个 FD"
          description: "单个 fc 进程的打开文件描述符 > 1300(hkprod 5000+ 沙箱满载实测 p90≈805、p99≈1000、max≈1081;FD 随节点负载近线性增长,1300 取 fleet 天花板之上),很可能是 FD 泄露。pid={{ $labels.pid }}。"

      - alert: Build VM 存活异常长(疑似卡死)
        uid: e2b-build-vm-stuck
        expr: e2b_fc_process_uptime_seconds{vm_kind="build"} > 7200
        for: 15m
        labels:
          severity: warning
          project: e2b
        annotations:
          summary: "节点 {{ $labels.node_ip }} 上 build VM {{ $labels.sandbox_id }} 已存活 {{ $value }}s(> 2h)"
          description: "template build 的 firecracker VM 正常分钟级完成,存活 > 2h 极可能是构建卡死或未清理(build VM 不进 orchestrator List,不会被 leak/TTL 逻辑回收)。阈值 7200s 为保守占位,待 hkprod 实测 build 时长分位数后收紧。pid={{ $labels.pid }}。"

      - alert: HugeTLB 池接近耗尽
        uid: e2b-node-hugepages-saturated
        expr: (e2b_node_hugepages_total - e2b_node_hugepages_free) / e2b_node_hugepages_total > 0.9 and e2b_node_hugepages_total > 0
        for: 5m
        labels:
          severity: critical
          project: e2b
        annotations:
          summary: "节点 {{ $labels.node_ip }} HugeTLB({{ $labels.size_bytes }}B) 使用率 > 90%"
          description: "HugeTLB 池剩余 < 10%,新沙箱创建会失败。可结合 e2b_sandbox_info 查看哪些 team/template 占了。"

      - alert: 节点磁盘接近写满
        uid: e2b-node-disk-saturated
        expr: (e2b_node_disk_total_bytes - e2b_node_disk_free_bytes) / e2b_node_disk_total_bytes > 0.9 and e2b_node_disk_total_bytes > 0
        for: 10m
        labels:
          severity: warning
          project: e2b
        annotations:
          summary: "节点 {{ $labels.node_ip }} 路径 {{ $labels.path }} 磁盘使用率 > 90%"
          description: "磁盘使用率持续 > 90%,沙箱启动可能出现 ENOSPC。"

      - alert: 沙箱超过声明的 TTL
        uid: e2b-sandbox-overrun
        expr: e2b_sandbox_overrun_seconds > 0
        for: 5m
        labels:
          severity: warning
          project: e2b
        annotations:
          summary: "沙箱 {{ $labels.sandbox_id }} 已超 max_sandbox_length {{ $value }}s"
          description: "沙箱运行已超过 max_sandbox_length 声明的上限,通常是客户端持续 keepalive 或 TTL 清理失败。node={{ $labels.node_ip }}。"

      - alert: 沙箱存活异常长(>20h)
        uid: e2b-sandbox-too-old
        expr: e2b_sandbox_age_seconds > 20 * 3600
        for: 5m
        labels:
          severity: info
          project: e2b
        annotations:
          summary: "沙箱 {{ $labels.sandbox_id }} 存活已 {{ $value }}s(> 20 小时)"
          description: "沙箱存活时间已超过 20 小时阈值(上限 24h)。node={{ $labels.node_ip }}。"

      - alert: Firecracker 出现僵尸进程
        uid: e2b-fc-zombie
        expr: e2b_fc_process_state_count{state="Z"} > 0
        for: 15m
        labels:
          severity: warning
          project: e2b
        annotations:
          summary: "节点 {{ $labels.node_ip }} 出现 {{ $value }} 个 Z 状态 firecracker"
          description: "fc 进程已退出但未被 reap,通常是父进程(orchestrator)漏处理 SIGCHLD。"

      - alert: Firecracker 卡内核 IO
        uid: e2b-fc-uninterruptible
        expr: e2b_fc_process_state_count{state="D"} > 0
        for: 15m
        labels:
          severity: warning
          project: e2b
        annotations:
          summary: "节点 {{ $labels.node_ip }} 出现 {{ $value }} 个 D 状态 firecracker"
          description: "fc 进程在 uninterruptible disk sleep,通常是底层 IO(NFS / 磁盘)阻塞。"

      - alert: Orchestrator List gRPC 慢
        uid: e2b-orchestrator-list-slow
        expr: e2b_orchestrator_list_duration_seconds > 0.5
        for: 5m
        labels:
          severity: warning
          project: e2b
        annotations:
          summary: "节点 {{ $labels.node_ip }} orchestrator List RTT={{ $value }}s"
          description: "本机 orchestrator 响应 SandboxService.List 持续 > 500ms,可能是 orchestrator 内部阻塞或沙箱列表过大。"
