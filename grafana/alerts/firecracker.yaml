groups:
  - name: e2b-firecracker
    interval: 30s
    rules:
      - alert: Firecracker Exporter 离线
        uid: e2b-fc-exporter-down
        expr: up{job="nomad-nodeJob-exporter"} == 0
        for: 5m
        labels:
          severity: warning
          project: e2b
        annotations:
          summary: "节点 {{ $labels.instance }} 上的 nomad-nodeJob-exporter 离线"
          description: "Exporter 已 5 分钟无法访问;Firecracker 与 Allocation 视角的指标已丢失。"

      - alert: Firecracker SandboxID 解析错误增多
        uid: e2b-fc-sandbox-id-parse-errors
        expr: increase(e2b_fc_process_parse_errors_total[10m]) > 0
        for: 10m
        labels:
          severity: warning
          project: e2b
        annotations:
          summary: "节点 {{ $labels.node_ip }} 上 Sandbox-ID 解析失败"
          description: "最近 10 分钟,Exporter 从 {{ $value }} 个 Firecracker 命令行中无法提取 sandbox_id。"

      - alert: Nomad Allocation 异常
        uid: e2b-nomad-alloc-down
        expr: nomad_allocation_up == 0
        for: 5m
        labels:
          severity: critical
          project: e2b
        annotations:
          summary: "节点 {{ $labels.node_name }} 上的 Nomad allocation {{ $labels.service }} 处于 DOWN 状态"
          description: "当前状态={{ $labels.status }},期望状态={{ $labels.desired_status }}"

      - alert: Allocation CPU 饱和
        uid: e2b-alloc-cpu-saturated
        expr: nomad_allocation_cpu_usage_percentage > 90
        for: 10m
        labels:
          severity: warning
          project: e2b
        annotations:
          summary: "节点 {{ $labels.node_name }} 上 Allocation {{ $labels.job_name }} CPU 占用 > 90%"

      - alert: Allocation 内存饱和
        uid: e2b-alloc-mem-saturated
        expr: nomad_allocation_memory_usage_percentage > 90
        for: 10m
        labels:
          severity: warning
          project: e2b
        annotations:
          summary: "节点 {{ $labels.node_name }} 上 Allocation {{ $labels.job_name }} 内存占用 > 90%"

      - alert: Firecracker 进程泄露
        uid: e2b-fc-leak
        expr: e2b_sandbox_leak_count > 0 and on(node_ip) e2b_orchestrator_reachable == 1
        for: 10m
        labels:
          severity: warning
          project: e2b
        annotations:
          summary: "节点 {{ $labels.node_ip }} 上检测到 {{ $value }} 个泄露的 Firecracker 进程"
          description: "存在 sandbox_id 不在 orchestrator 运行列表中的 Firecracker 进程,很可能是僵死/卡住的 fc 仍占用 HugeTLB。可通过 e2b_sandbox_leak{node_ip,sandbox_id,pid} 定位待清理的目标。"

      - alert: 孤儿沙箱
        uid: e2b-sandbox-orphan
        expr: e2b_sandbox_orphan_count > 0 and on(node_ip) e2b_orchestrator_reachable == 1
        for: 10m
        labels:
          severity: warning
          project: e2b
        annotations:
          summary: "节点 {{ $labels.node_ip }} 上发现 {{ $value }} 个孤儿沙箱"
          description: "Orchestrator 认为沙箱仍在运行,但找不到对应的 Firecracker 进程 —— 状态分裂,通常是 fc 崩溃后 orchestrator 未清理。"

      - alert: 本机 Orchestrator 不可达
        uid: e2b-orchestrator-unreachable
        expr: e2b_orchestrator_reachable == 0
        for: 5m
        labels:
          severity: critical
          project: e2b
        annotations:
          summary: "节点 {{ $labels.node_ip }} 上本机 orchestrator gRPC 不可达"
          description: "已跳过沙箱泄露检测 —— Exporter 无法连接 127.0.0.1:5008 上的 orchestrator。"

      - alert: Allocation 抖动
        uid: e2b-alloc-flapping
        expr: changes(nomad_allocation_up[15m]) > 4
        for: 5m
        labels:
          severity: warning
          project: e2b
        annotations:
          summary: "节点 {{ $labels.node_name }} 上 Allocation {{ $labels.service }} 抖动(15 分钟内重启 {{ $value }} 次)"
          description: "Allocation 的 up/down 状态在 15 分钟内变化超过 4 次,虽未严格 DOWN 但已不稳定 —— 请排查日志。"

      - alert: 集群 Firecracker 进程数为零
        uid: e2b-cluster-fc-zero
        expr: sum(e2b_fc_process_count) == 0
        for: 30m
        labels:
          severity: critical
          project: e2b
        annotations:
          summary: "整集群已 30 分钟未观测到任何 Firecracker 进程"
          description: "全集群 Firecracker 进程数为 0 —— 可能是沙箱被主动排空、调度器异常,或全部 Exporter 上报为 0(数据链路问题)。"

      - alert: Firecracker 进程线程数过多
        uid: e2b-fc-excess-threads
        expr: e2b_fc_process_threads > 30
        for: 5m
        labels:
          severity: warning
          project: e2b
        annotations:
          summary: "节点 {{ $labels.node_ip }} 上 Firecracker {{ $labels.sandbox_id }} 线程数为 {{ $value }}"
          description: "单个 fc 进程的线程数 > 30(正常 p99=5),很可能是线程泄露或 VM 卡住。pid={{ $labels.pid }}。"

      - alert: Firecracker 进程打开 FD 过多
        uid: e2b-fc-excess-open-fds
        expr: e2b_fc_process_open_fds > 500
        for: 5m
        labels:
          severity: warning
          project: e2b
        annotations:
          summary: "节点 {{ $labels.node_ip }} 上 Firecracker {{ $labels.sandbox_id }} 打开了 {{ $value }} 个 FD"
          description: "单个 fc 进程的打开文件描述符 > 500(正常 p99=141),很可能是 FD 泄露。pid={{ $labels.pid }}。"
